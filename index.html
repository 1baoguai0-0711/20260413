<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <script src="libraries/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #001b44; }
    #content-frame {
      position: absolute;
      top: 10%;
      right: 5%;
      width: 40%;
      height: 80%;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      z-index: 100;
      display: none; /* 初始隱藏 */
    }
    .iframe-close {
      position: absolute;
      top: -30px;
      right: 0;
      color: white;
      cursor: pointer;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="content-frame">
    <div class="iframe-close" onclick="document.getElementById('content-frame').style.display='none'">[ 關閉 X ]</div>
    <iframe id="work-iframe" src="" width="100%" height="100%" frameborder="0"></iframe>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
